# Production-oriented overrides.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build
#
# Provide secrets via a real .env file (never commit secrets).

services:
  api:
    environment:
      NODE_ENV: production
      RUN_MIGRATIONS: 'true'
      TRUST_PROXY: 'true'
      EMAIL_SANDBOX_MODE: 'false'
      STORAGE_SANDBOX_MODE: 'false'
      MEETING_SANDBOX_MODE: 'false'
      EMAIL_PROVIDER: RESEND
      STORAGE_PROVIDER: CLOUDINARY
    restart: always
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3001/api/v1/ready']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  web:
    environment:
      NODE_ENV: production
      DOCKER_BUILD: 'true'
    restart: always

  postgres:
    restart: always
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - max_connections=100
      - -c
      - log_min_duration_statement=500
